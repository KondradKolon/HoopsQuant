version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: hoopsquant_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: hoopsquant

    ports:
      - "5432:5432"

    volumes:
      - ./postgres_data:/var/lib/postgresql/data
